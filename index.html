<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pac-Man HTML5 Mobile Screen Locked</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <h1>PAC-MAN</h1>
    <canvas id="canvas" width="750" height="690"></canvas>
    
    <!-- Virtual D-Pad untuk Layar HP -->
    <div id="dpad">
      <button class="dbtn" onclick="handleDpad('ArrowUp')">▲</button>
      <div class="dpad-row">
        <button class="dbtn" onclick="handleDpad('ArrowLeft')">◀</button>
        <button class="dbtn" onclick="handleDpad('ArrowDown')">▼</button>
        <button class="dbtn" onclick="handleDpad('ArrowRight')">▶</button>
      </div>
      <button class="trap-btn" onclick="dropTrap()">DROP TRAP (SHIFT)</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
